<!DOCTYPE html>
<html>
<head>
    <title>AI Trading Dashboard</title>
</head>

<body style="font-family: Arial; text-align:center; background:#0f172a; color:white;">

<h1>📊 Multi-Market Trading Dashboard</h1>

<form method="POST">
    <input type="text" name="symbol" placeholder="BTC / EURUSD / XAUUSD" required>
    <button type="submit">Analyze</button>
</form>

{% if symbol %}
<h2>Symbol: {{ symbol }}</h2>
<h2>Signal: {{ signal }}</h2>
{% endif %}

<br><br>

<!-- TradingView Chart -->
<div style="width:90%; margin:auto;">
<iframe
    src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=60&theme=dark"
    width="100%"
    height="500">
</iframe>
</div>

</body>
</html>
